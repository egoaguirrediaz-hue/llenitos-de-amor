<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #ffdde1, #ee9ca7);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  overflow: hidden;
  flex-direction: column;
}

/* TEXTO */
h1 {
  font-size: 2.5em;
  margin: 0.5em;
}

p {
  font-size: 1.2em;
  max-width: 500px;
}

/* BOTÓN */
button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 1.1em;
  border: none;
  border-radius: 25px;
  background: #ff6f91;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px pink;
}

/* CORAZONES */
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: pink;
  transform: rotate(45deg);
  animation: fall 5s linear infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: pink;
  border-radius: 50%;
}

.heart::before { top: -10px; }
.heart::after { left: 10px; }

@keyframes fall {
  0% { transform: translateY(-100px) rotate(45deg); }
  100% { transform: translateY(100vh) rotate(45deg); }
}

/* POPUP */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.popup-content input {
  padding: 10px;
  font-size: 1.1em;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>💼 Feliz Día del Trabajador 💖</h1>
<h2>A la mujer más linda y trabajadora 🌹</h2>

<p>
Admiro todo lo que haces, tu esfuerzo, tu dedicación y la forma en que brillas en todo 💕  
Hoy solo quiero recordarte lo increíble que eres… y lo mucho que me encantas 😍
</p>

<button onclick="openPopup()">🎁 Abre tu sorpresa</button>

<!-- POPUP -->
<div id="popup">
  <div class="popup-content">
    <h3>💌 Ingresa la hora para tu detalle</h3>
    <input type="time" id="hora">
    <br><br>
    <button onclick="enviarWhatsApp()">Enviar 💖</button>
  </div>
</div>

<script>

/* ABRIR POPUP */
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

/* ENVIAR A WHATSAPP */
function enviarWhatsApp() {
  const hora = document.getElementById("hora").value;

  if (!hora) {
    alert("Elige una hora 😘");
    return;
  }

  const mensaje = `Hola mi amor 💖\nYa elegí la hora 🥰\nHora: ${hora} ⏰\nMe siento muy especial 😘💋`;

  const numero = "51958206051"; // tu número
  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

  window.open(url, "_blank");
}

/* CORAZONES */
function crearCorazon() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}

setInterval(crearCorazon, 300);

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Día 2 ✨ Algo que suena a nosotros</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Cormorant Garamond', serif;

  background:
  radial-gradient(circle at 10% 10%, #f6eee6, transparent 40%),
  radial-gradient(circle at 90% 90%, #eadcc8, transparent 40%),
  linear-gradient(180deg,#f8f1ea,#e6d6c5);
}

/* TARJETA */
.card{
  background:#fffaf3;
  width:90%;
  max-width:420px;
  padding:40px 28px;
  border-radius:18px;
  text-align:center;

  border:2px solid #e2d3c3;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
  animation:fade 1s ease;
}
  .videoBox{
  margin-top:18px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
  font-family:'Great Vibes', cursive;
  font-size:2.6em;
  color:#7a5c3e;
  margin-bottom:10px;
}

p{
  color:#5b4a3b;
  line-height:1.7;
  font-size:1.05em;
}

/* BOTONES */
button{
  display:block;
  width:100%;
  margin-top:14px;
  padding:11px;

  border:none;
  border-radius:22px;

  background:linear-gradient(45deg,#b9935a,#d6b77a);
  color:white;
  font-size:1em;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
}

/* FLORECITAS */
.heart{
  position:absolute;
  opacity:.15;
  animation:float 8s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

@keyframes fade{
  from{opacity:0; transform:translateY(15px)}
  to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<div class="card">
  <h1>Día 2 ♫</h1>

  <p>
    Hoy no quise mandarte algo que se material…<br><br>

    quise mandarte algo que se escuche 🤍<br><br>

    porque hay canciones que me recuerdan a ti,<br>
    y una voz que siempre quiero que te acompañe…<br><br>

    (sí… es la mía, no te asustes 😄)
  </p>

  <!-- CAMBIA ESTOS LINKS -->
  <button onclick="openAudio()">🎧 Escuchar mi mensaje</button>
  <!-- 🎵 Video romántico --> <div class="videoBox"> <iframe width="100%" height="200" src="https://www.youtube.com/embed/GxldQ9eX2wo?autoplay=1&mute=0&rel=0" title="Canción especial" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen> </iframe> </div>
</div>


<script>

/* 👉 REEMPLAZA ESTOS LINKS */
const audioLink = "audio.mp3"; 
// puede ser: "https://tu-servidor/audio.mp3"

const playlistLink = "https://open.spotify.com/"; 
// pega aquí tu playlist real


function openAudio(){
  window.open(audioLink, "_blank");
}

function openPlaylist(){
  window.open(playlistLink, "_blank");
}


/* corazoncitos flotando */
function heart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="♥";
  h.style.left=Math.random()*window.innerWidth+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),8000);
}

setInterval(heart,700);

</script>

</body>
</html>
